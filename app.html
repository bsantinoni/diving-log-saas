<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#03111F">
<title>Diving Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;600&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ═══════════════════════════════════════
   DESIGN: OCEAN DEPTH OPERATIONS
   Blues: deep-ocean navy → electric blue
   Accents: gold anchor / copper gauge
   Icons: inline SVG diving equipment
   ═══════════════════════════════════════ */
:root{
  --ink:    #03111F;
  --abyss:  #051829;
  --deep:   #071F35;
  --hull:   #0A2640;
  --plate:  #0D2E4B;
  --rim:    #143D62;
  --wire:   #1C5280;
  --muted:  #2E7AB0;
  --sub:    #4A9FD4;
  --dim:    #6DB8E8;
  --sky:    #00AAFF;
  --elec:   #0090FF;
  --elec2:  #006FCC;
  --glow:   rgba(0,170,255,0.18);
  --gold:   #F0B429;
  --goldD:  #C48A00;
  --copper: #CC7722;
  --teal:   #00C8B4;
  --bell:   #3B9FFF;
  --surf:   #00D4AA;
  --red:    #FF4040;
  --text:   #A8CCEC;
  --bright: #D8EEFF;
  --white:  #EEF6FF;
  --r:8px;--r2:14px;
  --tab-h:60px;--hdr-h:64px;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;
  background:var(--ink);color:var(--text);
  font-family:'Inter',sans-serif;font-size:13px;}

/* subtle wave pattern background */
body{
  background-image:
    radial-gradient(ellipse 120% 60% at 50% -20%, rgba(0,100,180,0.22) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 100% 80%, rgba(0,80,140,0.15) 0%, transparent 55%),
    radial-gradient(ellipse 50% 30% at 0% 60%, rgba(0,60,110,0.12) 0%, transparent 50%);
}

/* ── LAYOUT ─────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh;max-width:860px;margin:0 auto;position:relative;}

/* ── HEADER ─────────────────────────── */
header{
  height:var(--hdr-h);flex-shrink:0;
  background:linear-gradient(180deg, var(--abyss) 0%, rgba(5,24,41,0.97) 100%);
  border-bottom:1px solid var(--wire);
  padding:0 18px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10;
}
/* wave line at bottom of header */
header::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,var(--elec) 30%,var(--sky) 50%,var(--elec) 70%,transparent 100%);
  opacity:.6;
}

.hdr-left{display:flex;align-items:center;gap:14px;}

/* diving helmet icon */
.hdr-helmet{
  width:46px;height:46px;flex-shrink:0;
  filter:drop-shadow(0 0 8px rgba(0,170,255,0.5));
}

.hdr-titles{display:flex;flex-direction:column;gap:1px;}
.hdr-sup{font-family:'Teko',sans-serif;font-size:10px;font-weight:500;
  letter-spacing:.28em;text-transform:uppercase;color:var(--muted);}
.hdr-name{font-family:'Teko',sans-serif;font-size:26px;font-weight:700;
  letter-spacing:.06em;line-height:1;
  background:linear-gradient(135deg, var(--white) 0%, var(--dim) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

.hdr-right{display:flex;align-items:center;gap:10px;}

/* depth gauge in header */
.hdr-gauge{
  width:44px;height:44px;flex-shrink:0;
  filter:drop-shadow(0 0 5px rgba(0,170,255,0.3));
}

/* unit toggle */
.unit-toggle{display:flex;background:var(--plate);border:1px solid var(--wire);
  border-radius:6px;overflow:hidden;gap:1px;padding:2px;}
.unit-btn{background:none;border:none;color:var(--muted);
  font-family:'Teko',sans-serif;font-size:13px;font-weight:600;
  padding:4px 12px;border-radius:4px;cursor:pointer;transition:all .18s;letter-spacing:.06em;}
.unit-btn.on{background:var(--elec);color:#fff;box-shadow:0 0 12px rgba(0,144,255,.4);}

.btn-signout{background:none;border:1px solid var(--wire);color:var(--muted);
  font-family:'Inter',sans-serif;font-size:10px;padding:6px 12px;
  border-radius:6px;cursor:pointer;transition:all .18s;letter-spacing:.04em;}
.btn-signout:hover{border-color:var(--red);color:var(--red);}

/* ── MAIN ────────────────────────────── */
main{flex:1;overflow-y:auto;overscroll-behavior:contain;
  padding-bottom:calc(var(--tab-h) + 4px);}
main::-webkit-scrollbar{width:3px;}
main::-webkit-scrollbar-track{background:var(--abyss);}
main::-webkit-scrollbar-thumb{background:var(--wire);border-radius:2px;}

/* ── BOTTOM NAV ─────────────────────── */
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:860px;
  height:var(--tab-h);
  background:linear-gradient(180deg,rgba(5,24,41,0.98),var(--abyss));
  border-top:1px solid var(--wire);
  display:flex;z-index:20;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;border:none;background:none;color:var(--muted);
  font-family:'Teko',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;
  border-top:2.5px solid transparent;
  transition:color .18s,border-color .18s;padding-top:3px;
}
.tab-btn .ti{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
.tab-btn.on{color:var(--sky);border-top-color:var(--sky);}
.tab-btn.on-bell{color:var(--bell);border-top-color:var(--bell);}
.tab-btn.on-surf{color:var(--surf);border-top-color:var(--surf);}
.tab-btn.on-all{color:var(--dim);border-top-color:var(--dim);}
.tab-btn.on-stats{color:var(--gold);border-top-color:var(--gold);}

/* ── PANELS ─────────────────────────── */
.panel{display:none;padding:14px 14px 0;}
.panel.on{display:block;}

/* ── SECTION LABEL ──────────────────── */
.sec-label{
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;
}
.sec-label .sl-icon{width:18px;height:18px;flex-shrink:0;opacity:.8;}
.sec-label .sl-txt{
  font-family:'Teko',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;
}
.sec-label .sl-line{flex:1;height:1px;background:linear-gradient(to right,currentColor,transparent);opacity:.2;}

/* ── CARD ────────────────────────────── */
.card{
  background:linear-gradient(135deg, var(--hull) 0%, var(--deep) 100%);
  border:1px solid var(--wire);
  border-radius:var(--r2);
  padding:18px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.card-deco{
  position:absolute;top:-20px;right:-20px;opacity:.04;
  width:120px;height:120px;
}
/* top accent bar */
.card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--elec2),var(--sky),var(--teal),transparent);
  opacity:.5;border-radius:var(--r2) var(--r2) 0 0;
}

/* ── FIELDS ─────────────────────────── */
.field{margin-bottom:12px;}
.flabel{display:flex;align-items:center;gap:6px;
  font-family:'Inter',sans-serif;font-size:10px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:var(--sub);margin-bottom:5px;}
.flabel svg{width:11px;height:11px;opacity:.7;}
.req{color:var(--red);}

input[type=text],input[type=number],input[type=date],select,textarea{
  width:100%;background:var(--plate);border:1.5px solid var(--rim);
  border-radius:8px;padding:10px 13px;
  color:var(--bright);font-family:'Inter',sans-serif;font-size:13px;
  outline:none;-webkit-appearance:none;
  transition:border-color .18s,box-shadow .18s;color-scheme:dark;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--elec2);box-shadow:0 0 0 3px rgba(0,144,255,.12);}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4) sepia(1) saturate(2) hue-rotate(180deg);}
select option{background:var(--plate);}
textarea{resize:vertical;min-height:72px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

.depth-hint{font-size:10px;color:var(--muted);margin-top:4px;min-height:13px;transition:color .2s;}
.depth-hint.live{color:var(--sky);}

/* ── DIVE TYPE ───────────────────────── */
.type-row{display:flex;gap:10px;margin-bottom:14px;}
.type-btn{
  flex:1;padding:14px 8px;border-radius:10px;
  border:1.5px solid var(--rim);
  background:var(--plate);color:var(--muted);
  font-family:'Teko',sans-serif;font-size:15px;font-weight:600;
  letter-spacing:.05em;cursor:pointer;text-align:center;
  transition:all .2s;user-select:none;
  display:flex;flex-direction:column;align-items:center;gap:8px;
}
.type-btn svg{width:28px;height:28px;opacity:.5;transition:opacity .2s;}
.type-btn:hover svg{opacity:.8;}
.type-btn.bell-on{border-color:var(--bell);background:rgba(59,159,255,.1);color:var(--bell);
  box-shadow:0 0 16px rgba(59,159,255,.2);}
.type-btn.bell-on svg{opacity:1;}
.type-btn.surf-on{border-color:var(--surf);background:rgba(0,212,170,.08);color:var(--surf);
  box-shadow:0 0 16px rgba(0,212,170,.2);}
.type-btn.surf-on svg{opacity:1;}

/* ── COMBOBOX ────────────────────────── */
.combo-wrap{position:relative;}
.combo-row{display:flex;}
.combo-inp{flex:1;border-radius:8px 0 0 8px !important;}
.combo-arr{background:var(--plate);border:1.5px solid var(--rim);border-left:none;
  border-radius:0 8px 8px 0;color:var(--muted);cursor:pointer;
  padding:0 12px;display:flex;align-items:center;transition:color .18s;flex-shrink:0;}
.combo-arr:hover{color:var(--sky);}
.combo-arr svg{width:11px;height:11px;pointer-events:none;}
.combo-dd{position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--hull);border:1.5px solid var(--elec2);border-radius:8px;
  z-index:500;max-height:200px;overflow-y:auto;display:none;
  box-shadow:0 16px 48px rgba(0,0,0,.7), 0 0 24px rgba(0,144,255,.1);}
.combo-dd.open{display:block;}
.combo-opt{padding:11px 14px;cursor:pointer;font-size:13px;color:var(--text);
  border-bottom:1px solid var(--plate);transition:background .12s;}
.combo-opt:last-child{border-bottom:none;}
.combo-opt:hover{background:var(--plate);color:var(--bright);}
.combo-add{color:var(--sky);}
.combo-add::before{content:'+ ';font-weight:700;}

/* ── FORM ACTIONS ───────────────────── */
.form-actions{display:flex;gap:10px;margin-top:8px;}
.btn-repeat{
  flex:1;padding:12px;border-radius:8px;
  background:var(--plate);border:1.5px solid var(--rim);color:var(--text);
  font-family:'Teko',sans-serif;font-size:14px;font-weight:600;
  letter-spacing:.08em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .18s;
}
.btn-repeat svg{width:14px;height:14px;}
.btn-repeat:hover{border-color:var(--gold);color:var(--gold);}
.btn-save{
  flex:2;padding:12px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--elec2),var(--sky));
  color:#fff;font-family:'Teko',sans-serif;font-size:16px;font-weight:700;
  letter-spacing:.1em;cursor:pointer;
  box-shadow:0 4px 24px rgba(0,144,255,.35);
  transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-save svg{width:16px;height:16px;}
.btn-save:hover{box-shadow:0 4px 32px rgba(0,144,255,.55);transform:translateY(-1px);}
.btn-save:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.form-msg{font-size:11px;margin-top:8px;min-height:14px;text-align:center;letter-spacing:.04em;}
.form-msg.ok{color:var(--surf);}
.form-msg.err{color:var(--red);}

/* ── MONTH ACCORDION ────────────────── */
.month-grp{margin-bottom:8px;}
.month-hdr{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,var(--hull),var(--deep));
  border:1px solid var(--wire);border-radius:8px;
  padding:12px 16px;cursor:pointer;user-select:none;
  transition:border-color .18s,box-shadow .18s;
}
.month-hdr:hover,.month-hdr.open{border-color:var(--elec2);
  box-shadow:0 0 0 1px rgba(0,144,255,.1);}
.month-hdr.open{border-radius:8px 8px 0 0;}
.month-hdr-left{display:flex;align-items:center;gap:10px;}
.month-anchor{width:16px;height:16px;color:var(--gold);opacity:.7;flex-shrink:0;}
.month-lbl{font-family:'Teko',sans-serif;font-size:16px;font-weight:600;
  color:var(--bright);letter-spacing:.06em;text-transform:uppercase;}
.month-meta{font-size:10px;color:var(--muted);display:flex;gap:10px;align-items:center;}
.depth-badge{background:rgba(0,144,255,.1);border:1px solid rgba(0,144,255,.2);
  border-radius:4px;padding:2px 8px;color:var(--dim);font-size:9px;font-weight:500;}
.month-chev{color:var(--sub);transition:transform .22s;width:16px;height:16px;flex-shrink:0;}
.month-hdr.open .month-chev{transform:rotate(180deg);}
.month-body{display:none;border:1.5px solid var(--elec2);border-top:none;
  border-radius:0 0 8px 8px;overflow:hidden;}
.month-body.open{display:block;}

/* dive rows */
.dive-hdr-row,.dive-row{
  display:grid;grid-template-columns:82px 110px 1fr 82px 50px;
  align-items:center;gap:10px;padding:11px 16px;
  border-bottom:1px solid var(--plate);
}
.dive-row:last-child{border-bottom:none;}
.dive-hdr-row{background:rgba(13,46,75,.8);padding:7px 16px;border-bottom:1px solid var(--rim);}
.dive-row{transition:background .12s;}
.dive-row:hover{background:rgba(0,144,255,.04);}
.col-lbl{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.dive-date{font-size:11px;color:var(--sub);font-weight:500;}
.type-tag{font-family:'Teko',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  padding:3px 9px;border-radius:5px;display:inline-block;}
.tag-bell{background:rgba(59,159,255,.15);color:var(--bell);border:1px solid rgba(59,159,255,.25);}
.tag-surf{background:rgba(0,212,170,.1);color:var(--surf);border:1px solid rgba(0,212,170,.2);}
.tag-other{background:rgba(74,159,212,.1);color:var(--sub);border:1px solid var(--rim);}
.d-depth-main{font-family:'Teko',sans-serif;font-size:16px;font-weight:600;color:var(--bright);line-height:1.1;}
.d-depth-alt{font-size:9px;color:var(--muted);}
.d-job{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dive-actions{display:flex;gap:4px;justify-content:flex-end;}
.btn-ic{background:none;border:none;color:var(--muted);cursor:pointer;
  padding:5px;border-radius:5px;display:flex;align-items:center;transition:color .15s;}
.btn-ic.edit:hover{color:var(--sky);}
.btn-ic.del:hover{color:var(--red);}
.btn-ic svg{width:14px;height:14px;}

.empty{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-icon{width:52px;height:52px;margin:0 auto 16px;opacity:.25;}
.empty p{font-size:12px;line-height:1.7;}

/* ── STATS ───────────────────────────── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.stat-card{
  background:linear-gradient(135deg,var(--hull),var(--deep));
  border:1px solid var(--wire);border-radius:var(--r2);
  padding:18px 14px;text-align:center;position:relative;overflow:hidden;
}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,currentColor,transparent);opacity:.3;}
.stat-val{font-family:'Teko',sans-serif;font-size:40px;font-weight:700;line-height:1;}
.stat-unit{font-size:12px;color:var(--muted);margin-left:2px;font-family:'Inter',sans-serif;}
.stat-lbl{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* GAUGE SVG stat */
.gauge-card{
  background:linear-gradient(135deg,var(--hull),var(--deep));
  border:1px solid var(--wire);border-radius:var(--r2);
  padding:16px 12px 12px;text-align:center;position:relative;overflow:hidden;
}
.gauge-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,currentColor,transparent);opacity:.25;}
.gauge-svg-wrap{position:relative;width:80px;height:80px;margin:0 auto 6px;}
.gauge-svg-wrap svg{display:block;}
.gauge-center-num{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Teko',sans-serif;font-size:18px;font-weight:700;line-height:1;
}

/* depth bar */
.depth-bar-card{
  background:linear-gradient(135deg,var(--hull),var(--deep));
  border:1px solid var(--wire);border-radius:var(--r2);
  padding:18px;margin-bottom:14px;
}
.depth-bar-title{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
  font-family:'Teko',sans-serif;font-size:13px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;
}
.depth-bar-title svg{width:16px;height:16px;}
.depth-row{margin-bottom:12px;}
.depth-row-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.depth-row-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.depth-row-val{font-family:'Teko',sans-serif;font-size:22px;font-weight:700;line-height:1;}
.depth-track{height:8px;background:var(--plate);border-radius:4px;overflow:hidden;}
.depth-fill{height:100%;border-radius:4px;transition:width .6s ease;}
.depth-fill-max{background:linear-gradient(90deg,var(--elec2),var(--sky));
  box-shadow:0 0 8px rgba(0,144,255,.4);}
.depth-fill-avg{background:linear-gradient(90deg,var(--goldD),var(--gold));
  box-shadow:0 0 8px rgba(240,180,41,.3);}

/* leaderboard */
.lb-section{margin-bottom:14px;}
.lb-title{
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
  font-family:'Teko',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:.2em;text-transform:uppercase;
}
.lb-title svg{width:14px;height:14px;}
.lb-rows{display:flex;flex-direction:column;gap:5px;}
.lb-row{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,var(--hull),var(--deep));
  border:1px solid var(--wire);border-radius:8px;
  padding:10px 14px;position:relative;overflow:hidden;
}
.lb-bar{position:absolute;left:0;top:0;bottom:0;
  background:linear-gradient(90deg,rgba(0,144,255,.08),transparent);
  transition:width .5s ease;}
.lb-name{font-size:13px;color:var(--text);position:relative;z-index:1;font-weight:500;}
.lb-count{font-family:'Teko',sans-serif;font-size:20px;font-weight:700;
  color:var(--sky);position:relative;z-index:1;line-height:1;}

/* ── MODAL ───────────────────────────── */
.overlay{display:none;position:fixed;inset:0;
  background:rgba(3,17,31,.9);backdrop-filter:blur(8px);
  z-index:1000;align-items:center;justify-content:center;padding:16px;}
.overlay.open{display:flex;}
.modal{
  background:linear-gradient(135deg,var(--hull) 0%,var(--deep) 100%);
  border:1px solid var(--wire);border-radius:var(--r2);
  width:min(680px,100%);max-height:92vh;overflow-y:auto;
  padding:26px;position:relative;
  box-shadow:0 32px 80px rgba(0,0,0,.8), 0 0 40px rgba(0,144,255,.1);
}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--elec2),var(--sky),var(--teal));
  opacity:.7;border-radius:var(--r2) var(--r2) 0 0;}
.modal-header{display:flex;align-items:center;gap:12px;margin-bottom:22px;}
.modal-title{font-family:'Teko',sans-serif;font-size:22px;font-weight:700;
  color:var(--bright);letter-spacing:.06em;text-transform:uppercase;}
.modal-close{margin-left:auto;background:none;border:none;
  color:var(--sub);font-size:20px;cursor:pointer;padding:4px 8px;
  border-radius:5px;transition:color .15s;}
.modal-close:hover{color:var(--red);}
.modal-actions{display:flex;gap:10px;margin-top:18px;}
.btn-update{flex:1;background:linear-gradient(135deg,var(--elec2),var(--sky));
  color:#fff;border:none;padding:12px;border-radius:8px;
  font-family:'Teko',sans-serif;font-size:16px;font-weight:700;
  letter-spacing:.1em;cursor:pointer;
  box-shadow:0 4px 20px rgba(0,144,255,.3);transition:all .18s;}
.btn-update:hover{box-shadow:0 4px 28px rgba(0,144,255,.5);transform:translateY(-1px);}
.btn-update:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-cancel{background:var(--plate);border:1.5px solid var(--rim);color:var(--text);
  padding:12px 22px;border-radius:8px;font-family:'Teko',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;letter-spacing:.06em;}
.btn-cancel:hover{border-color:var(--sub);}

/* ── TOAST ───────────────────────────── */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--hull);border:1.5px solid var(--elec2);color:var(--bright);
  padding:11px 24px;border-radius:24px;
  font-family:'Inter',sans-serif;font-size:12px;font-weight:500;letter-spacing:.04em;
  z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 32px rgba(0,0,0,.6), 0 0 20px rgba(0,144,255,.2);}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.err{border-color:var(--red);color:var(--red);}

.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;animation:rot .65s linear infinite;vertical-align:middle;}
@keyframes rot{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ─────────────────────── */
@media(min-width:620px){
  .stat-grid{grid-template-columns:repeat(4,1fr);}
  .dive-hdr-row,.dive-row{grid-template-columns:90px 120px 1fr 90px 56px;}
}
@media(max-width:480px){
  .hdr-gauge{display:none;}
  .dive-hdr-row,.dive-row{grid-template-columns:70px 1fr 64px 42px;}
  .dive-hdr-row .col-lbl:nth-child(3),.dive-row .d-job{display:none;}
  .type-btn{font-size:13px;}
  .type-btn svg{width:22px;height:22px;}
}
</style>

<script>
// ═══════════════════════════════════
const SUPA_URL='https://jqbtjklxbfydmwwztbvn.supabase.co';
const SUPA_KEY='sb_publishable_KT7j111OChA9tnNq2gqkAQ_Vp7TfGkG';
const APP_ROOT='/diving-log-saas/';
const {createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_KEY);

let user=null,allDives=[],lastDive=null,editingId=null;
let unitSys='metric',diveType='',editType='';
let ddData={divers:[],job:[],client:[],vessel:[],country:[]};
let activeTab='new';

// UNITS
const M2FT=3.28084,FT2M=1/3.28084;
const toDisplay=m=>m==null?null:unitSys==='imperial'?Math.round(m*M2FT):m;
const toMeters=v=>{if(v==null||v==='')return null;const n=parseFloat(v);return isNaN(n)?null:unitSys==='imperial'?Math.round(n*FT2M*10)/10:n;};
const uLbl=()=>unitSys==='imperial'?'ft':'m';
const uAlt=()=>unitSys==='imperial'?'m':'ft';
const toAlt=m=>m==null?null:unitSys==='imperial'?m:Math.round(m*M2FT);

function setUnit(u){
  unitSys=u;
  document.getElementById('btn-m').classList.toggle('on',u==='metric');
  document.getElementById('btn-ft').classList.toggle('on',u==='imperial');
  document.getElementById('lbl-depth').childNodes[document.getElementById('lbl-depth').childNodes.length-1].textContent=` Depth (${uLbl()})`;
  document.getElementById('lbl-depth').innerHTML=document.getElementById('lbl-depth').innerHTML.replace(/Depth \([^)]+\)/,`Depth (${uLbl()})`);
  const el=document.getElementById('e-lbl-depth');if(el)el.textContent=`Depth (${uLbl()})`;
  sb.from('profiles').update({unit_system:u}).eq('id',user.id).then(()=>{});
  renderAllLogs();if(activeTab==='stats')renderStats();
  showToast(u==='metric'?'Switched to Metric (m)':'Switched to Imperial (ft)');
}
function updateHint(iid,hid){
  const v=parseFloat(document.getElementById(iid)?.value);
  const h=document.getElementById(hid);if(!h)return;
  if(isNaN(v)||!document.getElementById(iid).value){h.textContent='';h.className='depth-hint';return;}
  h.textContent=unitSys==='imperial'?`≈ ${Math.round(v*FT2M*10)/10} m`:`≈ ${Math.round(v*M2FT)} ft`;
  h.className='depth-hint live';
}

// AUTH
async function boot(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href=APP_ROOT+'index.html';return;}
  user=session.user;
  const{data:prof}=await sb.from('profiles').select('unit_system').eq('id',user.id).single();
  if(prof?.unit_system){
    unitSys=prof.unit_system;
    document.getElementById('btn-m').classList.toggle('on',unitSys==='metric');
    document.getElementById('btn-ft').classList.toggle('on',unitSys==='imperial');
    const dl=document.getElementById('lbl-depth');
    if(dl)dl.innerHTML=dl.innerHTML.replace(/Depth \([^)]+\)/,`Depth (${uLbl()})`);
  }
  await loadDropdowns();buildAllCombos();await loadDives();setToday();
}
document.getElementById('btn-out').addEventListener('click',async()=>{
  await sb.auth.signOut();window.location.href=APP_ROOT+'index.html';
});

// TABS
const TABS={
  new: {panel:'panel-new', btn:'tn-new',  cls:'on'},
  bell:{panel:'panel-bell',btn:'tn-bell', cls:'on-bell'},
  surf:{panel:'panel-surf',btn:'tn-surf', cls:'on-surf'},
  all: {panel:'panel-all', btn:'tn-all',  cls:'on-all'},
  stats:{panel:'panel-stats',btn:'tn-stats',cls:'on-stats'},
};
function goTab(t){
  activeTab=t;
  Object.keys(TABS).forEach(k=>{
    const m=TABS[k];
    document.getElementById(m.panel).classList.toggle('on',k===t);
    document.getElementById(m.btn).className='tab-btn'+(k===t?' '+m.cls:'');
  });
  document.getElementById('main').scrollTop=0;
  if(t==='stats')renderStats();

// DIVE TYPE
function pickType(t){diveType=t;
  document.getElementById('tb-bell').className='type-btn'+(t==='Bell/Sat'?' bell-on':'');
  document.getElementById('tb-surf').className='type-btn'+(t==='Surface Supply'?' surf-on':'');}
function pickEditType(t){editType=t;
  document.getElementById('etb-bell').className='type-btn'+(t==='Bell/Sat'?' bell-on':'');
  document.getElementById('etb-surf').className='type-btn'+(t==='Surface Supply'?' surf-on':'');}

// DROPDOWNS
async function loadDropdowns(){
  const{data}=await sb.from('dropdown_options').select('*').eq('user_id',user.id);
  ddData={divers:[],job:[],client:[],vessel:[],country:[]};
  (data||[]).forEach(r=>{if(ddData[r.field_name]!==undefined)ddData[r.field_name].push(r.value);});
}
async function saveDD(key,val){
  if(!val?.trim()||ddData[key].includes(val.trim()))return;
  ddData[key].push(val.trim());
  await sb.from('dropdown_options').insert({user_id:user.id,field_name:key,value:val.trim()});
}

// COMBOBOX
const CW_MAIN=[
  {w:'cw-divers', k:'divers', p:'Search or add diver…',  f:'f-divers'},
  {w:'cw-job',    k:'job',    p:'Search or add job…',     f:'f-job'},
  {w:'cw-client', k:'client', p:'Search or add client…',  f:'f-client'},
  {w:'cw-vessel', k:'vessel', p:'Search or add vessel…',  f:'f-vessel'},
  {w:'cw-country',k:'country',p:'Search or add country…', f:'f-country'},
];
const CW_EDIT=[
  {w:'ecw-divers', k:'divers', p:'Divers…',  f:'e-divers'},
  {w:'ecw-job',    k:'job',    p:'Job…',      f:'e-job'},
  {w:'ecw-client', k:'client', p:'Client…',   f:'e-client'},
  {w:'ecw-vessel', k:'vessel', p:'Vessel…',   f:'e-vessel'},
  {w:'ecw-country',k:'country',p:'Country…',  f:'e-country'},
];
function buildAllCombos(){[...CW_MAIN,...CW_EDIT].forEach(c=>buildCombo(c.w,c.k,c.p,c.f));}
function buildCombo(wrapId,key,ph,fid){
  const wrap=document.getElementById(wrapId);if(!wrap)return;
  wrap.innerHTML=`
    <div class="combo-row">
      <input type="text" class="combo-inp" id="${fid}" placeholder="${ph}" autocomplete="off">
      <button type="button" class="combo-arr" tabindex="-1">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>
    <div class="combo-dd" id="${fid}-dd"></div>`;
  const inp=document.getElementById(fid),dd=document.getElementById(fid+'-dd');
  const arr=wrap.querySelector('.combo-arr');
  function open(q=''){
    const opts=ddData[key].filter(v=>v.toLowerCase().includes(q.toLowerCase()));
    dd.innerHTML='';
    opts.forEach(v=>{
      const el=document.createElement('div');el.className='combo-opt';el.textContent=v;
      el.addEventListener('mousedown',e=>{e.preventDefault();inp.value=v;dd.classList.remove('open');});
      dd.appendChild(el);
    });
    if(q.trim()&&!ddData[key].map(v=>v.toLowerCase()).includes(q.trim().toLowerCase())){
      const add=document.createElement('div');add.className='combo-opt combo-add';
      add.textContent=`Add "${q.trim()}"`;
      add.addEventListener('mousedown',async e=>{
        e.preventDefault();await saveDD(key,q.trim());inp.value=q.trim();dd.classList.remove('open');
      });
      dd.appendChild(add);
    }
    dd.classList.toggle('open',dd.children.length>0);
  }
  inp.addEventListener('focus',()=>open(inp.value));
  inp.addEventListener('input',()=>open(inp.value));
  inp.addEventListener('blur',()=>setTimeout(()=>dd.classList.remove('open'),200));
  arr.addEventListener('mousedown',e=>{
    e.preventDefault();
    if(dd.classList.contains('open')){dd.classList.remove('open');return;}
    open(inp.value);inp.focus();
  });
}

// FORM
function setToday(){const el=document.getElementById('f-date');if(el&&!el.value)el.value=new Date().toISOString().split('T')[0];}
const gv=id=>document.getElementById(id)?.value||'';
const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};
function readForm(pfx='f'){
  return{date:gv(`${pfx}-date`),dive_type:pfx==='f'?diveType:editType,
    depth:toMeters(gv(`${pfx}-depth`)),depth_unit:unitSys,
    divers:gv(`${pfx}-divers`),deco:gv(`${pfx}-deco`),tdt:gv(`${pfx}-tdt`),
    job:gv(`${pfx}-job`),client:gv(`${pfx}-client`),vessel:gv(`${pfx}-vessel`),
    location:gv(`${pfx}-location`),country:gv(`${pfx}-country`),notes:gv(`${pfx}-notes`)};
}
function fillForm(d,pfx='f'){
  sv(`${pfx}-date`,d.date);sv(`${pfx}-depth`,d.depth!=null?toDisplay(d.depth):'');
  ['divers','deco','tdt','job','client','vessel','location','country','notes'].forEach(k=>sv(`${pfx}-${k}`,d[k]));
  updateHint(`${pfx}-depth`,pfx==='f'?'hint-depth':'e-hint-depth');
  if(pfx==='f')pickType(d.dive_type||'');else pickEditType(d.dive_type||'');
}
function clearForm(){
  ['date','depth','divers','deco','tdt','job','client','vessel','location','country','notes'].forEach(id=>sv(`f-${id}`,''));
  pickType('');setToday();
  document.getElementById('hint-depth').textContent='';
  document.getElementById('form-msg').textContent='';
}
async function saveAllDD(d){
  await Promise.all(['divers','job','client','vessel','country'].map(k=>saveDD(k,d[k])));
}

// SAVE
async function saveDive(){
  const p=readForm('f');
  if(!p.date){showFMsg('Date is required.','err');return;}
  const btn=document.getElementById('btn-save');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span> Saving…';
  await saveAllDD(p);
  const{data,error}=await sb.from('dives').insert({user_id:user.id,...p}).select().single();
  btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M10 2 L10 14 M5 9 L10 14 L15 9"/><path d="M3 16 L17 16"/></svg> Save Dive';
  if(error){showFMsg(error.message,'err');return;}
  lastDive={...p};allDives.unshift(data);
  renderAllLogs();clearForm();showToast('Dive saved successfully ✓');
  showFMsg('Record saved!','ok');setTimeout(()=>{document.getElementById('form-msg').textContent='';},3000);
}
function showFMsg(txt,cls){const el=document.getElementById('form-msg');el.textContent=txt;el.className=`form-msg ${cls}`;}

// REPEAT
function repeatLast(){
  const src=lastDive||allDives[0];
  if(!src){showToast('No previous dive found','err');return;}
  fillForm({...src,date:new Date().toISOString().split('T')[0]},'f');
  showToast('Last dive loaded — review & save');
}

// LOAD
async function loadDives(){
  const{data,error}=await sb.from('dives').select('*').eq('user_id',user.id).order('date',{ascending:false});
  if(error){console.error(error);return;}
  allDives=data||[];if(allDives.length)lastDive=allDives[0];renderAllLogs();
}

// RENDER
function renderAllLogs(){
  renderLog('log-bell',allDives.filter(d=>d.dive_type==='Bell/Sat'));
  renderLog('log-surf',allDives.filter(d=>d.dive_type==='Surface Supply'));
  renderLog('log-all',allDives);
}
function renderLog(cid,dives){
  const el=document.getElementById(cid);if(!el)return;
  if(!dives.length){
    el.innerHTML=`<div class="empty">
      <svg class="empty-icon" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="24" stroke="currentColor" stroke-width="1.5"/>
        <path d="M14 26 C14 18 38 18 38 26 L38 34 L14 34 Z" stroke="currentColor" stroke-width="1.5"/>
        <ellipse cx="26" cy="23" rx="7" ry="5" stroke="currentColor" stroke-width="1.2"/>
        <line x1="26" y1="34" x2="26" y2="42" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 2"/>
      </svg>
      <p>No dives logged in this category yet.<br>Use the New Entry tab to add records.</p>
    </div>`;return;
  }
  const groups={};
  dives.forEach(d=>{const k=d.date?d.date.slice(0,7):'unknown';if(!groups[k])groups[k]=[];groups[k].push(d);});
  const MON=['January','February','March','April','May','June','July','August','September','October','November','December'];
  let html='';let first=true;
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(ym=>{
    const ds=groups[ym];const[yr,mo]=ym.split('-');
    const lbl=`${MON[parseInt(mo)-1]} ${yr}`;
    const maxD=Math.max(...ds.map(d=>d.depth||0));
    const maxStr=maxD?`↓ ${toDisplay(maxD)}${uLbl()} / ${toAlt(maxD)}${uAlt()}`:'';
    const isOpen=first;first=false;
    html+=`
      <div class="month-grp">
        <div class="month-hdr ${isOpen?'open':''}" onclick="toggleMonth(this)">
          <div class="month-hdr-left">
            <svg class="month-anchor" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="5" r="2"/><line x1="12" y1="7" x2="12" y2="20"/>
              <path d="M6 13l6 7 6-7"/><line x1="6" y1="9" x2="18" y2="9"/>
            </svg>
            <span class="month-lbl">${lbl}</span>
          </div>
          <span class="month-meta">
            <span>${ds.length} dive${ds.length!==1?'s':''}</span>
            ${maxStr?`<span class="depth-badge">${maxStr}</span>`:''}
          </span>
          <svg class="month-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="month-body ${isOpen?'open':''}">
          <div class="dive-hdr-row">
            <span class="col-lbl">Date</span><span class="col-lbl">Type</span>
            <span class="col-lbl">Job / Location</span><span class="col-lbl">Depth</span>
            <span class="col-lbl"></span>
          </div>
          ${ds.map(d=>diveRow(d)).join('')}
        </div>
      </div>`;
  });
  el.innerHTML=html;
  el.querySelectorAll('.btn-edit').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openEdit(b.dataset.id);}));
  el.querySelectorAll('.btn-del').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();delDive(b.dataset.id);}));
}
function diveRow(d){
  const tc=d.dive_type==='Bell/Sat'?'tag-bell':d.dive_type==='Surface Supply'?'tag-surf':'tag-other';
  const tl=d.dive_type==='Bell/Sat'?'Bell/Sat':d.dive_type==='Surface Supply'?'Surface':'Other';
  const jobLoc=[d.job,d.location||d.country].filter(Boolean).join(' · ')||'—';
  const dm=d.depth!=null?`${toDisplay(d.depth)} ${uLbl()}`:'—';
  const da=d.depth!=null?`${toAlt(d.depth)} ${uAlt()}`:'';
  return `
    <div class="dive-row">
      <span class="dive-date">${d.date?fmtDate(d.date):'—'}</span>
      <span><span class="type-tag ${tc}">${tl}</span></span>
      <span class="d-job">${jobLoc}</span>
      <span><div class="d-depth-main">${dm}</div>${da?`<div class="d-depth-alt">${da}</div>`:''}</span>
      <span class="dive-actions">
        <button class="btn-ic edit btn-edit" data-id="${d.id}" title="Edit">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="btn-ic del btn-del" data-id="${d.id}" title="Delete">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        </button>
      </span>
    </div>`;
}
function toggleMonth(hdr){hdr.classList.toggle('open');hdr.nextElementSibling.classList.toggle('open');}
function fmtDate(iso){const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;}

// DELETE
async function delDive(id){
  if(!confirm('Delete this dive record?'))return;
  const{error}=await sb.from('dives').delete().eq('id',id);
  if(error){showToast(error.message,'err');return;}
  allDives=allDives.filter(d=>d.id!=id);renderAllLogs();
  if(activeTab==='stats')renderStats();showToast('Record deleted');
}

// EDIT
function openEdit(id){
  const d=allDives.find(d=>d.id==id);if(!d)return;
  editingId=id;editType=d.dive_type||'';
  fillForm(d,'e');
  const el=document.getElementById('e-lbl-depth');if(el)el.textContent=`Depth (${uLbl()})`;
  document.getElementById('edit-overlay').classList.add('open');
  document.getElementById('edit-msg').textContent='';
}
function closeEdit(){document.getElementById('edit-overlay').classList.remove('open');editingId=null;editType='';}
document.getElementById('edit-overlay').addEventListener('click',function(e){if(e.target===this)closeEdit();});
async function updateDive(){
  if(!editingId)return;
  const p=readForm('e');
  if(!p.dive_type){const orig=allDives.find(d=>d.id==editingId);p.dive_type=orig?.dive_type||'';}
  await saveAllDD(p);
  const btn=document.getElementById('btn-update');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  const{data,error}=await sb.from('dives').update(p).eq('id',editingId).select().single();
  btn.disabled=false;btn.textContent='Update Record';
  if(error){const em=document.getElementById('edit-msg');em.textContent=error.message;em.className='form-msg err';return;}
  allDives=allDives.map(d=>d.id==editingId?data:d);
  renderAllLogs();if(activeTab==='stats')renderStats();
  closeEdit();showToast('Record updated ✓');
}

// STATS
function renderStats(){
  const el=document.getElementById('stats-content');if(!el)return;
  const total=allDives.length;
  const bells=allDives.filter(d=>d.dive_type==='Bell/Sat').length;
  const surfs=allDives.filter(d=>d.dive_type==='Surface Supply').length;
  const depths=allDives.filter(d=>d.depth!=null).map(d=>d.depth);
  const maxD=depths.length?Math.max(...depths):null;
  const avgD=depths.length?depths.reduce((a,b)=>a+b,0)/depths.length:null;
  const clientMap={},vesselMap={};
  allDives.forEach(d=>{
    if(d.client)clientMap[d.client]=(clientMap[d.client]||0)+1;
    if(d.vessel)vesselMap[d.vessel]=(vesselMap[d.vessel]||0)+1;
  });
  const topC=Object.entries(clientMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const topV=Object.entries(vesselMap).sort((a,b)=>b[1]-a[1]).slice(0,5);

            <circle cx="40" cy="28" r="3" stroke="var(--bell)" stroke-width="1.5" fill="none" opacity=".4"/>
          </svg>
          <div class="gauge-center-num" style="color:var(--bell)">${bells}</div>
        </div>
        <div class="stat-lbl">Bell / Sat</div>
      </div>
      <!-- Surface gauge -->
      <div class="gauge-card" style="color:var(--surf)">
        <div class="gauge-svg-wrap">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="34" fill="none" stroke="var(--plate)" stroke-width="6"/>
            <circle cx="40" cy="40" r="34" fill="none" stroke="var(--surf)"
              stroke-width="6" stroke-linecap="round"
              stroke-dasharray="${surfDash} ${CIRC}"
              transform="rotate(-90 40 40)" opacity=".9"/>
            <!-- helmet inside gauge -->
            <ellipse cx="40" cy="40" rx="9" ry="7" stroke="var(--surf)" stroke-width="1.3" fill="none" opacity=".4"/>
            <path d="M32 40 C32 33 48 33 48 40" stroke="var(--surf)" stroke-width="1.3" fill="none" opacity=".4"/>
          </svg>
          <div class="gauge-center-num" style="color:var(--surf)">${surfs}</div>

    </div>

    ${maxD!=null?`

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="9"/>

            <span class="lb-name">${n}</span>
            <span class="lb-count" style="color:var(--gold)">${c}</span>
          </div>`).join('')}
      </div>
    </div>`:''}

    ${!total?`<div class="empty">
      <svg class="empty-icon" viewBox="0 0 52 52" fill="none">
        <circle cx="26" cy="26" r="24" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="26" cy="26" r="9" stroke="currentColor" stroke-width="1.2"/>
        <line x1="26" y1="26" x2="36" y2="16" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="26" cy="26" r="2" fill="currentColor"/>
      </svg>
      <p>Log some dives to see your summary statistics.</p>
    </div>`:''}
  `;
}

// TOAST
let _tt;
function showToast(msg,type='ok'){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className=type==='err'?'show err':'show';
  clearTimeout(_tt);_tt=setTimeout(()=>t.className='',3000);
}

boot();
</script>
