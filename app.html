<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diving Log — App</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, sans-serif;
      background: #0a1628;
      color: #fff;
      min-height: 100vh;
      padding: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    h1 { color: #64ffda; font-size: 22px; }
    .user { color: #8892b0; font-size: 13px; }
    button.logout {
      background: transparent;
      border: 1px solid #ff6b6b;
      color: #ff6b6b;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .welcome {
      background: #112240;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
    }
    .welcome h2 { color: #64ffda; margin-bottom: 12px; }
    .welcome p { color: #8892b0; font-size: 15px; }
  </style>
</head>
<body>

<header>
  <h1>🤿 Diving Log</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <span class="user" id="userEmail"></span>
    <button class="logout" onclick="logout()">Sign Out</button>
  </div>
</header>

<div class="welcome">
  <h2>Welcome aboard! ✅</h2>
  <p>Login successful. The full app is coming next.</p>
</div>

<script>
  const SUPABASE_URL = 'https://jqbtjklxbfydmwwztbvn.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_KT7j111OChA9tnNq2gqkAQ_Vp7TfGkG'
  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_KEY)

  async function init() {
    const { data: { session } } = await db.auth.getSession()
    if (!session) return window.location.href = 'index.html'
    document.getElementById('userEmail').textContent = session.user.email
  }

  async function logout() {
    await db.auth.signOut()
    window.location.href = 'index.html'
  }

  init()
</script>
</body>
</html>
